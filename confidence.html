<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESA Host Confidence Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0b0d13;
      --panel: #141823;
      --panel-2: #101420;
      --line: rgba(255, 255, 255, 0.07);
      --text: #f4f6fb;
      --muted: #8b93a7;
      --muted-2: #aab2c5;
      --accent: #4d7cff;
      --air: #ff4136;
      --standby: #4d7cff;
      --wrap: #ffb02e;
      --live: #2ee6a0;
    }

    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }
    body { font-family: 'Barlow', system-ui, sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

    /* Scale the fixed 1920x1080 stage to fit any monitor (letterboxed). */
    #scaler { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    #stage {
      width: 1920px; height: 1080px; flex-shrink: 0;
      background: var(--bg); padding: 50px;
      display: grid; grid-template-rows: 130px 1fr 268px 110px; gap: 26px;
      transform-origin: center center;
    }

    @keyframes ccpulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }
    @keyframes ccdot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.7); opacity: .5; } }
    @keyframes ccblink { 0%, 100% { opacity: 1; } 50% { opacity: .15; } }

    .row { display: flex; align-items: center; }
    .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
    .bsc { font-family: 'Barlow Semi Condensed', sans-serif; }

    /* header */
    #header { display: flex; justify-content: space-between; align-items: center; }
    #header img { height: 62px; width: auto; display: block; }
    .ev-title { font: 800 36px 'Barlow Semi Condensed'; letter-spacing: .01em; line-height: 1; }
    .ev-sub { font: 600 17px 'Barlow Semi Condensed'; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
    #clock { font: 700 62px 'JetBrains Mono'; font-variant-numeric: tabular-nums; letter-spacing: -.02em; line-height: 1; }
    #slipChip { display: flex; align-items: center; gap: 13px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 22px; }
    #slipChip .k { font: 600 14px 'Barlow Semi Condensed'; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    #slipChip .v { font: 800 36px 'Barlow Semi Condensed'; font-variant-numeric: tabular-nums; line-height: 1; }
    #slipChip .l { font: 700 16px 'Barlow Semi Condensed'; letter-spacing: .1em; text-transform: uppercase; }

    /* hero */
    #hero { display: grid; grid-template-columns: 1.28fr 1fr; gap: 26px; min-height: 0; }
    .card { background: var(--panel); border: 1px solid rgba(255,255,255,.06); border-radius: 20px; }
    #totalCard { padding: 40px 46px; display: flex; flex-direction: column; justify-content: center; }
    #totalCard .hd { display: flex; align-items: center; gap: 13px; margin-bottom: 10px; }
    #totalCard .dot { width: 15px; height: 15px; border-radius: 50%; background: var(--live); animation: ccdot 1.6s ease-in-out infinite; }
    #totalCard .lbl { font: 700 20px 'Barlow Semi Condensed'; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
    #totalAmt { font: 800 150px 'Barlow Semi Condensed'; font-variant-numeric: tabular-nums; letter-spacing: -.03em; line-height: .9; color: #fff; }
    #totalFor { font-size: 27px; color: var(--muted-2); margin-top: 12px; }
    #totalFor strong { color: var(--text); }

    #stateCard { padding: 40px 46px; display: flex; flex-direction: column; justify-content: center; border-width: 2px; border-style: solid; }
    #stateCard .lbl { font: 700 20px 'Barlow Semi Condensed'; letter-spacing: .16em; text-transform: uppercase; color: #cfd5e3; margin-bottom: 8px; }
    #stateCard .big { display: flex; align-items: center; gap: 24px; }
    #stateCard .sdot { width: 40px; height: 40px; border-radius: 50%; animation: ccdot 1.4s ease-in-out infinite; }
    #stateLabel { font: 800 104px 'Barlow Semi Condensed'; line-height: .88; letter-spacing: -.01em; }
    #stateSub { font: 700 30px 'Barlow Semi Condensed'; letter-spacing: .04em; text-transform: uppercase; color: #fff; margin-top: 18px; }

    /* modules */
    #modules { display: grid; grid-template-columns: 1.12fr 1fr; gap: 26px; min-height: 0; }
    .mod { padding: 26px 32px; display: flex; flex-direction: column; }
    .mod-title { font: 700 18px 'Barlow Semi Condensed'; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .run-row { display: flex; align-items: center; gap: 18px; padding: 11px 0; border-top: 1px solid rgba(255,255,255,.06); }
    .run-est { font: 700 22px 'JetBrains Mono'; font-variant-numeric: tabular-nums; color: var(--accent); min-width: 112px; }
    .run-mid { flex: 1; min-width: 0; }
    .run-game { font: 700 30px 'Barlow Semi Condensed'; }
    .run-cat { font-size: 21px; color: var(--muted); margin-left: 12px; }
    .run-players { font-size: 21px; color: #cfd5e3; }
    .run-plat { font: 600 14px 'Barlow Semi Condensed'; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); background: var(--bg); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 5px 11px; }
    .empty { color: #5d6478; font-size: 22px; padding: 16px 0; }

    /* bid war / progress bars */
    .bar-block { margin-bottom: 22px; }
    .bar-block:last-child { margin-bottom: 0; }
    .bar-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .bar-name { font: 700 29px 'Barlow Semi Condensed'; color: var(--text); }
    .bar-amt { font: 800 29px 'Barlow Semi Condensed'; font-variant-numeric: tabular-nums; }
    .bar-track { height: 28px; background: var(--bg); border-radius: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 8px; transition: width .6s ease; }

    /* feature takeover */
    #feature { display: none; background: rgba(77,124,255,.07); border: 2px solid var(--accent); border-radius: 20px; padding: 26px 38px; flex-direction: column; min-height: 0; box-shadow: 0 0 50px rgba(77,124,255,.12) inset; }
    #feature .fhd { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    #feature .live-tag { font: 800 16px 'Barlow Semi Condensed'; letter-spacing: .14em; text-transform: uppercase; color: var(--bg); background: var(--accent); border-radius: 8px; padding: 7px 14px; display: flex; align-items: center; gap: 9px; }
    #feature .live-tag .b { width: 11px; height: 11px; border-radius: 50%; background: var(--bg); animation: ccblink 1s steps(1) infinite; }
    #feature .ftitle { font: 800 30px 'Barlow Semi Condensed'; color: #fff; letter-spacing: .02em; }
    #feature .react { font: 600 17px 'Barlow Semi Condensed'; letter-spacing: .1em; text-transform: uppercase; color: #9fb4ff; }
    #featureBody { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }

    /* producer banner */
    #producer { display: flex; align-items: center; gap: 24px; border-radius: 16px; padding: 0 34px; height: 100%; }
    #producer .tag { font: 800 17px 'Barlow Semi Condensed'; letter-spacing: .14em; text-transform: uppercase; border-radius: 9px; padding: 9px 16px; white-space: nowrap; }
    #producer .msg { font: 700 39px 'Barlow Semi Condensed'; color: #fff; line-height: 1.05; flex: 1; text-wrap: balance; }
    #producer.idle { background: var(--panel-2); border: 1px solid rgba(255,255,255,.06); }
    #producer.idle .tag { color: #5d6478; background: transparent; border: 1px solid rgba(255,255,255,.1); }
    #producer.idle .msg { font-weight: 500; font-size: 28px; color: #5d6478; }
  </style>
</head>
<body>
  <div id="scaler">
    <div id="stage">

      <!-- header -->
      <div id="header">
        <div class="row" style="gap:22px;">
          <img id="brand" src="" alt="ESA">
          <div>
            <div class="ev-title" id="evTitle">ESA</div>
            <div class="ev-sub" id="evSub"></div>
          </div>
        </div>
        <div class="row" style="gap:28px;">
          <div id="clock" class="mono">--:--:--</div>
          <div id="slipChip" style="display:none;">
            <span class="k">Schedule</span>
            <span class="v" id="slipVal">ON TIME</span>
            <span class="l" id="slipLbl"></span>
          </div>
        </div>
      </div>

      <!-- hero: total + studio state -->
      <div id="hero">
        <div id="totalCard" class="card">
          <div class="hd"><span class="dot"></span><span class="lbl">Total Raised — Live</span></div>
          <div id="totalAmt">—</div>
          <div id="totalFor" style="display:none;"></div>
        </div>
        <div id="stateCard">
          <div class="lbl">Studio State</div>
          <div class="big"><span class="sdot" id="stateDot"></span><span id="stateLabel" class="bsc">STANDBY</span></div>
          <div id="stateSub">Standing By</div>
        </div>
      </div>

      <!-- modules (default) -->
      <div id="modules">
        <div class="mod card">
          <div class="mod-title">Up Next</div>
          <div id="upNextRows"><div class="empty">Schedule loading…</div></div>
        </div>
        <div class="mod card" id="secondaryMod" style="justify-content:center;">
          <div class="mod-title" id="secondaryTitle">Bid War</div>
          <div id="secondaryBody"><div class="empty">No active incentive.</div></div>
        </div>
      </div>

      <!-- feature takeover (replaces modules when active) -->
      <div id="feature">
        <div class="fhd">
          <span class="live-tag"><span class="b"></span>Live on Stream</span>
          <span class="ftitle" id="featureTitle"></span>
          <span style="flex:1;"></span>
          <span class="react">Hosts — react to this</span>
        </div>
        <div id="featureBody"></div>
      </div>

      <!-- producer banner -->
      <div id="producer" class="idle">
        <span class="tag" id="prodTag">Producer</span>
        <span class="msg" id="prodMsg">Booth is quiet — no active cue.</span>
      </div>

    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const myScene = urlParams.get('scene') || 'confidence';

    // ESA logotype; override via ?logo=<url>
    const logoUrl = urlParams.get('logo') || 'esa-logotype.png';
    document.getElementById('brand').src = logoUrl;
    if (urlParams.get('event')) document.getElementById('evTitle').textContent = urlParams.get('event');
    if (urlParams.get('sub')) document.getElementById('evSub').textContent = urlParams.get('sub');

    // ===== State =====
    let tiltifyData = { campaign: null, donations: [], targets: [], polls: [], milestones: [], donationMatches: [], incentives: {} };
    let scheduleData = { upcoming: [], previous: [] };
    let studioState = 'standby';
    let feature = { feature: 'none' };
    let producer = { active: false, text: '', level: 'info' };

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str == null ? '' : str;
      return d.innerHTML;
    }

    // ===== Scale-to-fit =====
    const stage = document.getElementById('stage');
    function fit() {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      stage.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    fit();

    // ===== Currency =====
    const CUR = { USD: '$', EUR: '€', GBP: '£', SEK: 'kr ', NOK: 'kr ', DKK: 'kr ', CAD: '$', AUD: '$' };
    function curSymbol() {
      const c = tiltifyData.campaign;
      const code = c && (c.total_amount_raised?.currency || c.amount_raised?.currency || c.goal?.currency);
      return CUR[code] || '$';
    }
    function moneyBig(value) {
      const n = Math.round(parseFloat(value) || 0);
      return curSymbol() + n.toLocaleString('en-US');
    }

    // ===== Clock =====
    function pad(n) { return String(n).padStart(2, '0'); }
    function tickClock() {
      const d = new Date();
      document.getElementById('clock').textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
      renderSlip();
    }
    setInterval(tickClock, 1000);

    // ===== Schedule slip =====
    function renderSlip() {
      const chip = document.getElementById('slipChip');
      const runs = scheduleData.upcoming || [];
      if (!runs.length || !runs[0].scheduled_t) { chip.style.display = 'none'; return; }
      chip.style.display = 'flex';
      const now = Math.floor(Date.now() / 1000);
      const slip = now - runs[0].scheduled_t; // +behind / -ahead (seconds)
      const a = Math.abs(slip);
      const valEl = document.getElementById('slipVal');
      const lblEl = document.getElementById('slipLbl');
      if (a < 60) {
        valEl.textContent = 'ON TIME'; valEl.style.color = 'var(--accent)';
        lblEl.textContent = ''; lblEl.style.color = 'var(--accent)';
      } else {
        valEl.textContent = (slip < 0 ? '−' : '+') + Math.floor(a / 60) + ':' + pad(a % 60);
        const col = slip > 0 ? 'var(--wrap)' : 'var(--live)';
        valEl.style.color = col; lblEl.style.color = col;
        lblEl.textContent = slip > 0 ? 'Behind' : 'Ahead';
      }
    }

    // ===== Studio state =====
    const MODES = {
      standby: { label: 'STANDBY', sub: 'Standing By', color: '#4d7cff', soft: 'rgba(77,124,255,.14)' },
      air:     { label: 'ON AIR',  sub: 'Hosts Are Live', color: '#ff4136', soft: 'rgba(255,65,54,.13)' },
      wrap:    { label: 'WRAP UP', sub: 'Bring It Home', color: '#ffb02e', soft: 'rgba(255,176,46,.15)' },
    };
    function renderState() {
      const m = MODES[studioState] || MODES.standby;
      const card = document.getElementById('stateCard');
      card.style.background = m.soft;
      card.style.borderColor = m.color;
      card.style.animation = studioState === 'wrap' ? 'ccpulse 1.15s ease-in-out infinite' : 'none';
      document.getElementById('stateDot').style.background = m.color;
      document.getElementById('stateDot').style.boxShadow = '0 0 36px ' + m.color;
      const lab = document.getElementById('stateLabel');
      lab.textContent = m.label; lab.style.color = m.color;
      document.getElementById('stateSub').textContent = m.sub;
    }

    // ===== Total =====
    function renderTotal() {
      const c = tiltifyData.campaign;
      const raised = c ? (c.total_amount_raised?.value ?? c.amount_raised?.value ?? 0) : 0;
      document.getElementById('totalAmt').textContent = c ? moneyBig(raised) : '—';
      const forEl = document.getElementById('totalFor');
      const causeName = c && (c.cause?.name || c.fundraising_event?.name);
      if (causeName) {
        forEl.style.display = 'block';
        forEl.innerHTML = 'for the <strong>' + escHtml(causeName) + '</strong>';
      } else {
        forEl.style.display = 'none';
      }
      if (c && !urlParams.get('event')) document.getElementById('evTitle').textContent = c.name || 'ESA';
    }

    // ===== Up Next module =====
    function runEst(run) {
      if (!run.scheduled) return '';
      const d = new Date(run.scheduled);
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return days[d.getDay()] + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function renderUpNext() {
      const runs = (scheduleData.upcoming || []).slice(0, 3);
      const host = document.getElementById('upNextRows');
      if (!runs.length) { host.innerHTML = '<div class="empty">No upcoming runs.</div>'; return; }
      host.innerHTML = runs.map(r =>
        '<div class="run-row">' +
          '<span class="run-est">' + escHtml(runEst(r)) + '</span>' +
          '<div class="run-mid"><span class="run-game">' + escHtml(r.game || 'TBD') + '</span>' +
            (r.category ? '<span class="run-cat">' + escHtml(r.category) + '</span>' : '') + '</div>' +
          (r.players ? '<span class="run-players">' + escHtml(r.players) + '</span>' : '') +
          (r.platform ? '<span class="run-plat">' + escHtml(r.platform) + '</span>' : '') +
        '</div>'
      ).join('');
    }

    // ===== Secondary module (bid war / incentive) =====
    function pollBars(poll, big) {
      const options = (poll.options || []).slice().sort((a, b) =>
        parseFloat(b.total_amount_raised?.value || b.amount_raised?.value || 0) -
        parseFloat(a.total_amount_raised?.value || a.amount_raised?.value || 0));
      const top = options.slice(0, big ? 2 : 2);
      const max = Math.max(...top.map(o => parseFloat(o.total_amount_raised?.value || o.amount_raised?.value || 0)), 1);
      return top.map((o, i) => {
        const amt = parseFloat(o.total_amount_raised?.value || o.amount_raised?.value || 0);
        const pct = Math.round((amt / max) * 100);
        const lead = i === 0;
        return '<div class="bar-block">' +
          '<div class="bar-head"><span class="bar-name">' + escHtml(o.name) + '</span>' +
          '<span class="bar-amt" style="color:' + (lead ? 'var(--accent)' : '#cfd5e3') + '">' + moneyBig(amt) + '</span></div>' +
          '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:' + (lead ? 'var(--accent)' : '#5d6478') + '"></div></div>' +
        '</div>';
      }).join('');
    }
    function targetBars(t) {
      const raised = parseFloat(t.amount_raised?.value || t.current_amount?.value || 0);
      const goal = parseFloat(t.amount?.value || t.goal?.value || 1);
      const pct = Math.min(100, Math.round((raised / goal) * 100));
      return '<div class="bar-block">' +
        '<div class="bar-head"><span class="bar-name">' + escHtml(t.name || 'Incentive') + '</span>' +
        '<span class="bar-amt" style="color:var(--accent)">' + pct + '%</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%;background:var(--accent)"></div></div>' +
        '<div style="display:flex;justify-content:space-between;margin-top:10px;" class="mono">' +
          '<span style="color:var(--muted-2);font-size:21px;">' + moneyBig(raised) + '</span>' +
          '<span style="color:var(--muted-2);font-size:21px;">' + moneyBig(goal) + ' goal</span></div>' +
      '</div>';
    }
    function renderSecondary() {
      const titleEl = document.getElementById('secondaryTitle');
      const body = document.getElementById('secondaryBody');
      const polls = tiltifyData.polls || [];
      const targets = tiltifyData.targets || [];
      if (polls.length) {
        titleEl.textContent = polls[0].name || 'Bid War';
        body.innerHTML = pollBars(polls[0], false);
      } else if (targets.length) {
        titleEl.textContent = 'Incentive';
        body.innerHTML = targetBars(targets[0]);
      } else {
        titleEl.textContent = 'Bid War';
        body.innerHTML = '<div class="empty">No active incentive.</div>';
      }
    }

    // ===== Feature takeover =====
    function renderFeature() {
      const f = feature.feature || 'none';
      const featEl = document.getElementById('feature');
      const modEl = document.getElementById('modules');
      if (f === 'none') { featEl.style.display = 'none'; modEl.style.display = 'grid'; return; }
      featEl.style.display = 'flex'; modEl.style.display = 'none';

      const title = document.getElementById('featureTitle');
      const body = document.getElementById('featureBody');
      const polls = tiltifyData.polls || [];
      const targets = tiltifyData.targets || [];
      const runs = scheduleData.upcoming || [];

      if (f === 'total') {
        const c = tiltifyData.campaign;
        const raised = c ? (c.total_amount_raised?.value ?? c.amount_raised?.value ?? 0) : 0;
        title.textContent = 'Donation Total';
        body.innerHTML = '<div style="text-align:center;">' +
          '<div style="font:800 130px \'Barlow Semi Condensed\';font-variant-numeric:tabular-nums;letter-spacing:-.03em;line-height:.9;color:#fff;">' + (c ? moneyBig(raised) : '—') + '</div>' +
          '<div style="font:600 26px \'Barlow\';color:var(--muted-2);margin-top:10px;">raised so far — read the milestones</div></div>';
      } else if (f === 'bidwar') {
        const poll = polls[feature.pollIndex || 0] || polls[0];
        if (poll) { title.textContent = poll.name || 'Bid War'; body.innerHTML = '<div style="display:flex;gap:34px;">' + featurePollCols(poll) + '</div>'; }
        else { title.textContent = 'Bid War'; body.innerHTML = '<div class="empty">No active bid war.</div>'; }
      } else if (f === 'incentive') {
        const t = targets[feature.targetIndex || 0] || targets[0];
        if (t) {
          const raised = parseFloat(t.amount_raised?.value || t.current_amount?.value || 0);
          const goal = parseFloat(t.amount?.value || t.goal?.value || 1);
          const pct = Math.min(100, Math.round((raised / goal) * 100));
          title.textContent = t.name || 'Incentive';
          body.innerHTML =
            '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;">' +
              '<span style="font:800 40px \'Barlow Semi Condensed\';">' + escHtml(t.name || 'Incentive') + '</span>' +
              '<span style="font:800 44px \'Barlow Semi Condensed\';color:var(--accent);">' + pct + '%</span></div>' +
            '<div style="height:40px;background:var(--bg);border-radius:10px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:var(--accent);border-radius:10px;transition:width .6s ease;"></div></div>' +
            '<div class="mono" style="display:flex;justify-content:space-between;margin-top:12px;font-size:24px;color:var(--muted-2);"><span>' + moneyBig(raised) + ' raised</span><span>' + moneyBig(goal) + ' goal</span></div>';
        } else { title.textContent = 'Incentive'; body.innerHTML = '<div class="empty">No active incentive.</div>'; }
      } else if (f === 'schedule') {
        const list = feature.list === 'prev' ? (scheduleData.previous || []) : runs;
        const r = list[feature.runIndex || 0] || list[0];
        if (r) {
          title.textContent = 'Coming Up Next';
          body.innerHTML = '<div>' +
            '<div style="display:flex;align-items:baseline;gap:20px;"><span style="font:800 72px \'Barlow Semi Condensed\';line-height:1;">' + escHtml(r.game || 'TBD') + '</span>' +
              (r.category ? '<span style="font:500 32px \'Barlow\';color:var(--muted-2);">' + escHtml(r.category) + '</span>' : '') + '</div>' +
            '<div style="display:flex;align-items:center;gap:20px;margin-top:14px;">' +
              (r.players ? '<span style="font:600 28px \'Barlow\';color:#e7ebf3;">' + escHtml(r.players) + '</span>' : '') +
              (runEst(r) ? '<span class="mono" style="font:700 26px \'JetBrains Mono\';color:var(--accent);background:var(--bg);border-radius:9px;padding:6px 16px;">' + escHtml(runEst(r)) + '</span>' : '') +
            '</div></div>';
        } else { title.textContent = 'Coming Up Next'; body.innerHTML = '<div class="empty">No upcoming runs.</div>'; }
      }
    }
    function featurePollCols(poll) {
      const options = (poll.options || []).slice().sort((a, b) =>
        parseFloat(b.total_amount_raised?.value || b.amount_raised?.value || 0) -
        parseFloat(a.total_amount_raised?.value || a.amount_raised?.value || 0)).slice(0, 2);
      const max = Math.max(...options.map(o => parseFloat(o.total_amount_raised?.value || o.amount_raised?.value || 0)), 1);
      return options.map((o, i) => {
        const amt = parseFloat(o.total_amount_raised?.value || o.amount_raised?.value || 0);
        const pct = Math.round((amt / max) * 100);
        const lead = i === 0;
        return '<div style="flex:1;">' +
          '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">' +
            '<span style="font:800 44px \'Barlow Semi Condensed\';">' + escHtml(o.name) + '</span>' +
            '<span style="font:800 44px \'Barlow Semi Condensed\';color:' + (lead ? 'var(--accent)' : '#cfd5e3') + ';">' + moneyBig(amt) + '</span></div>' +
          '<div style="height:34px;background:var(--bg);border-radius:9px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:' + (lead ? 'var(--accent)' : '#5d6478') + ';border-radius:9px;transition:width .6s ease;"></div></div></div>';
      }).join('');
    }

    // ===== Producer banner =====
    function renderProducer() {
      const el = document.getElementById('producer');
      const tag = document.getElementById('prodTag');
      const msg = document.getElementById('prodMsg');
      if (producer.active && producer.text) {
        const urgent = producer.level === 'urgent';
        const color = urgent ? 'var(--air)' : 'var(--accent)';
        const soft = urgent ? 'rgba(255,65,54,.14)' : 'rgba(77,124,255,.14)';
        el.className = '';
        el.style.background = soft;
        el.style.border = '1px solid ' + color;
        el.style.borderLeft = '11px solid ' + color;
        tag.style.color = 'var(--bg)';
        tag.style.background = color;
        tag.style.border = 'none';
        tag.textContent = 'Producer · ' + (urgent ? 'Urgent' : 'Info');
        msg.style.cssText = '';
        msg.textContent = producer.text;
      } else {
        el.className = 'idle';
        el.style.cssText = '';
        tag.style.cssText = '';
        tag.textContent = 'Producer';
        msg.style.cssText = '';
        msg.textContent = 'Booth is quiet — no active cue.';
      }
    }

    // ===== WebSocket =====
    const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws';
    let ws;
    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'pong' }));
      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }
        switch (data.type) {
          case 'tiltify_data':
            tiltifyData = {
              campaign: data.campaign,
              donations: data.donations || [],
              targets: data.targets || [],
              polls: data.polls || [],
              milestones: data.milestones || [],
              donationMatches: data.donationMatches || [],
              incentives: data.incentives || {},
            };
            renderTotal(); renderSecondary(); renderFeature();
            break;
          case 'schedule_data':
            scheduleData = { upcoming: data.upcoming || [], previous: data.previous || [] };
            renderUpNext(); renderSlip(); renderFeature();
            break;
          case 'confidence_state':
            if (data.scene && data.scene !== myScene) break;
            studioState = data.state || 'standby';
            renderState();
            break;
          case 'confidence_feature':
            if (data.scene && data.scene !== myScene) break;
            feature = data;
            renderFeature();
            break;
          case 'producer_msg':
            if (data.scene && data.scene !== myScene) break;
            producer = { active: data.active !== false && !!data.text, text: data.text || '', level: data.level || 'info' };
            renderProducer();
            break;
          case 'ping':
            ws.send(JSON.stringify({ type: 'pong' }));
            break;
        }
      };
      ws.onclose = () => setTimeout(connect, 2000);
    }
    connect();

    // initial paint
    renderState(); renderTotal(); renderUpNext(); renderSecondary(); renderFeature(); renderProducer(); tickClock();
  </script>
</body>
</html>
